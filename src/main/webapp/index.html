<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<link rel="icon" href="assets/upf.png">
	<title>Forkful</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

	<!-- Google Fonts: Pacifico (titles) + Nunito (body) -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script>
		window.App = window.App || {};
		App.Errors = App.Errors || {};
	</script>
	<script src="js/LoginValidation.js"></script>
	<script src="js/RegisterValidation.js"></script>

	<script>
		App.init = function () {
			$.ajaxSetup({ cache: false });

			// Reset pagination state on fresh load
			App.currentPage = 0;
			App.feedFilter = null;   // null = default (all posts)
			App.feedUid = null;   // used when filter=user
			App.loadingMore = false;

			// Load initial content
			$('#navigation').load("Header");
			$('#lcolumn').load("Menu");
			$('#content').load("Content");
			$('#rcolumn').load("NotFollowed");

			App.bindEvents();
		};

		/* Reload all chrome (header + sidebar + suggestions) */
		App.reloadChrome = function () {
			$('#navigation').load("Header");
			$('#lcolumn').load("Menu");
			$('#rcolumn').load("NotFollowed");
		};

		/* Build Posts URL with current pagination params */
		App._postsUrl = function (page) {
			var url = 'Posts?page=' + page;
			if (App.feedFilter) url += '&filter=' + encodeURIComponent(App.feedFilter);
			if (App.feedUid) url += '&uid=' + encodeURIComponent(App.feedUid);
			return url;
		};

		/* Append a "Load more" button below #iterator if not already present */
		App._ensureLoadMoreBtn = function () {
			if ($('#load-more-btn').length) return;
			var btn = $(
				'<div id="load-more-wrapper" style="text-align:center; margin:16px 0 8px;">' +
				'  <button id="load-more-btn" ' +
				'    style="background:linear-gradient(135deg,#E46B39,#d05325);color:#fff;border:none;' +
				'           border-radius:10px;padding:10px 28px;font-size:14px;font-weight:700;' +
				'           cursor:pointer;box-shadow:0 4px 12px rgba(228,107,57,0.3);">' +
				'    <i class="fa fa-refresh"></i> Load more' +
				'  </button>' +
				'</div>'
			);
			$('#iterator').after(btn);
		};

		/* Remove "Load more" button (e.g. no more results) */
		App._removeLoadMoreBtn = function () {
			$('#load-more-wrapper').remove();
		};

		/* Load the next page of posts and append them */
		App.loadMorePosts = function () {
			if (App.loadingMore) return;
			App.loadingMore = true;
			$('#load-more-btn').text('Loading…').prop('disabled', true);

			App.currentPage++;
			$.get(App._postsUrl(App.currentPage), function (html) {
				// html from FeedPosts.jsp — extract inner content of #iterator if present,
				// otherwise append the whole fragment
				var $html = $(html);
				var $inner = $html.filter('#iterator').add($html.find('#iterator'));
				var toAppend = $inner.length ? $inner.html() : html;
				$('#iterator').append(toAppend);

				// If the returned fragment has no #load-more-hint the server flagged hasMore=false
				// We detect "no more" by checking if fewer posts than page size were returned
				var newPostCount = $inner.length
					? $inner.children('[id]').length
					: $(toAppend).filter('[id]').length;

				if (newPostCount === 0) {
					App._removeLoadMoreBtn();
				} else {
					$('#load-more-btn').html('<i class="fa fa-refresh"></i> Load more').prop('disabled', false);
				}
				App.loadingMore = false;
			}).fail(function () {
				App.loadingMore = false;
				$('#load-more-btn').html('<i class="fa fa-refresh"></i> Load more').prop('disabled', false);
			});
		};

		App.bindEvents = function () {
			// Deal with menu clicks — load target into #content
			$(document).on("click", ".menu", function (event) {
				event.preventDefault();
				var href = $(this).attr('href');
				var hrefParts = href.split('?');
				var route = hrefParts[0];
				var params = new URLSearchParams(hrefParts[1] || '');

				// Update page title based on nav item
				var labels = {
					'Content': 'Forkful — Home',
					'Posts': 'Forkful — Explore',
					'Notifications': 'Forkful — Notifications',
					'Profile': 'Forkful — Profile',
					'Followed': 'Forkful — Following',
					'Followers': 'Forkful — Followers',
					'More': 'Forkful — Saved',
					'Timeline': 'Forkful — Timeline'
				};
				document.title = labels[route] || 'Forkful';

				// Reset pagination when navigating to a feed
				App.currentPage = 0;
				App.feedFilter = null;
				App.feedUid = null;
				App._removeLoadMoreBtn();
				if (route === 'Posts') {
					App.feedFilter = params.get('filter');
					App.feedUid = params.get('uid');
				}

				$('#content').load(href, function () {
					if (route === 'Posts' && !$('#iterator').length) {
						$('#content').wrapInner('<div id="iterator"></div>');
					}
					// After loading, if there's an #iterator, show Load More
					if ($('#iterator').length) {
						App._ensureLoadMoreBtn();
					}
				});
			});

			// "Load more" button click
			$(document).on("click", "#load-more-btn", function () {
				App.loadMorePosts();
			});

			// Deal with form submission via AJAX
			$(document).on("submit", "form", function (event) {
				if (event.isDefaultPrevented() || !this.checkValidity()) {
					return;
				}
				event.preventDefault();
				const form = this;
				const data = new FormData(form);
				$.ajax({
					type: 'POST',
					enctype: 'multipart/form-data',
					url: $(form).attr('action'),
					data: data,
					processData: false,
					contentType: false
				}).done(function (html) {
					App.reloadChrome();
					$("#content").html(html);
					// Restore "Load more" if the new content has a feed
					if ($('#iterator').length) {
						App.currentPage = 0;
						App._removeLoadMoreBtn();
						App._ensureLoadMoreBtn();
					}
				});
			});

			/* Follow user */
			$(document).on("click", ".followUser", function (event) {
				event.preventDefault();
				$.post("Follow", {
					id: $(this).parent().attr("id")
				}, function () {
					$("#content").load("Followed");
					$("#rcolumn").load("NotFollowed");
				});
			});
			/* UnFollow user */
			$(document).on("click", ".unfollowUser", function (event) {
				event.preventDefault();
				$.post("Unfollow", {
					id: $(this).parent().attr("id")
				}, function () {
					$("#content").load("Followed");
					$("#rcolumn").load("NotFollowed");
				});
			});

			/* Refresh feed after post actions */
			function refreshFeed() {
				if ($('#iterator').length) {
					// Reset to page 0 so we don't lose context
					App.currentPage = 0;
					App._removeLoadMoreBtn();
					$('#iterator').load(App._postsUrl(0), function () {
						App._ensureLoadMoreBtn();
					});
				} else {
					$('#content').load('Content');
				}
			}

			/* Delete post */
			$(document).on("click", ".delPost", function (event) {
				event.preventDefault();
				var postId = $(this).closest('[id]').attr('id');
				$.post("DelPost", { id: postId }, refreshFeed);
			});
			/* Like post */
			$(document).on("click", ".likePost", function (event) {
				event.preventDefault();
				var postId = $(this).closest('[id]').attr('id');
				$.post("LikePost", { id: postId }, refreshFeed);
			});
			/* Unlike post */
			$(document).on("click", ".unlikePost", function (event) {
				event.preventDefault();
				var postId = $(this).closest('[id]').attr('id');
				$.post("UnlikePost", { id: postId }, refreshFeed);
			});
			/* Save post */
			$(document).on("click", ".savePost", function (event) {
				event.preventDefault();
				var postId = $(this).closest('[id]').attr('id');
				$.post("SavePost", { id: postId }, refreshFeed);
			});
			/* Unsave post */
			$(document).on("click", ".unsavePost", function (event) {
				event.preventDefault();
				var postId = $(this).closest('[id]').attr('id');
				$.post("UnsavePost", { id: postId }, refreshFeed);
			});

			/* Toggle comments panel */
			$(document).on("click", ".toggleComments", function (event) {
				event.preventDefault();
				var postId = $(this).closest('[id]').attr('id');
				var panel = $('#comments-panel-' + postId);
				var list = $('#comments-list-' + postId);
				panel.slideToggle(200);
				if (!panel.data('loaded')) {
					list.load('Posts?filter=comments&pid=' + postId);
					panel.data('loaded', true);
				}
			});

			/* Submit comment via button click */
			$(document).on("click", ".submitComment", function (event) {
				event.preventDefault();
				var postId = $(this).data('pid');
				var input = $('#comment-input-' + postId);
				var content = $.trim(input.val());
				if (!content) return;
				$.post("AddPost", { type: 'comment', content: content, pid: postId }, function () {
					input.val('');
					$('#comments-list-' + postId).load('Posts?filter=comments&pid=' + postId);
				});
			});

			/* Submit comment via Enter key */
			$(document).on("keydown", "input[id^='comment-input-']", function (event) {
				if (event.key === 'Enter') {
					event.preventDefault();
					var postId = this.id.replace('comment-input-', '');
					var content = $.trim($(this).val());
					if (!content) return;
					$.post("AddPost", { type: 'comment', content: content, pid: postId }, function () {
						$('#comment-input-' + postId).val('');
						$('#comments-list-' + postId).load('Posts?filter=comments&pid=' + postId);
					});
				}
			});
			/* Toggle edit panel */
			$(document).on("click", ".editPost", function (event) {
				event.preventDefault();
				var postId = $(this).closest('.w3-card').attr('id');
				$('#edit-panel-' + postId).slideToggle(200);
			});

			/* Cancel edit */
			$(document).on("click", ".cancelEdit", function (event) {
				event.preventDefault();
				var postId = $(this).closest('.w3-card').attr('id');
				$('#edit-panel-' + postId).slideUp(200);
			});

			/* Submit edit form */
			$(document).on("submit", ".editPostForm", function (event) {
				event.preventDefault();
				var fd = new FormData(this);
				var postId = $(this).closest('.w3-card').attr('id');
				$.ajax({
					url: 'EditPost',
					type: 'POST',
					data: fd,
					processData: false,
					contentType: false
				}).done(function () {
					$('#edit-panel-' + postId).slideUp(200);
					refreshFeed();
				});
			});

		};

		$(document).ready(function () {
			App.init();
		});
	</script>

</head>

<body>

	<!-- Begin Navigation -->
	<div class="forkful-nav w3-top" id="navigation"></div>
	<!-- End Navigation -->

	<!-- Begin Content -->
	<div class="w3-row-padding" style="margin-top: 120px; margin-bottom: 75px;">

		<!-- Left Column -->
		<div class="w3-container w3-col m3 w3-hide-small">
			<div id="lcolumn"></div>
		</div>
		<!-- Middle Column -->
		<div class="w3-container w3-col m6">
			<div id="content"></div>
		</div>
		<!-- Right Column -->
		<div class="w3-container w3-col m3 w3-hide-small">
			<div id="rcolumn"></div>
		</div>

	</div>

	<!-- Mobile bottom navigation -->
	<div id="mobile-nav" style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:200;
	     background:#FFF6ED; border-top:2px solid #CE9C6A; padding:6px 0 env(safe-area-inset-bottom);
	     box-shadow:0 -2px 8px rgba(70,51,31,0.10);">
		<div style="display:flex; justify-content:space-around; align-items:center;">
			<a class="menu" href="Content"
				style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#46331F;font-size:10px;font-weight:700;padding:4px 10px;">
				<i class="fa fa-home" style="font-size:20px;color:#E46B39;"></i>Home
			</a>
			<a class="menu" href="Posts"
				style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#46331F;font-size:10px;font-weight:700;padding:4px 10px;">
				<i class="fa fa-compass" style="font-size:20px;"></i>Explore
			</a>
			<a class="menu" href="Notifications"
				style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#46331F;font-size:10px;font-weight:700;padding:4px 10px;">
				<i class="fa fa-bell" style="font-size:20px;"></i>Alerts
			</a>
			<a class="menu" href="Profile"
				style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#46331F;font-size:10px;font-weight:700;padding:4px 10px;">
				<i class="fa fa-user" style="font-size:20px;"></i>Profile
			</a>
		</div>
	</div>

	<script>
		function checkMobileNav() {
			document.getElementById('mobile-nav').style.display =
				window.innerWidth <= 768 ? 'block' : 'none';
		}
		window.addEventListener('resize', checkMobileNav);
		document.addEventListener('DOMContentLoaded', checkMobileNav);
	</script>

</body>

</html>
